<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title th:text="${title}">Formulario de Película</title>
  </head>
  <body>
    <div class="container">
      <h1 th:text="${title}">Formulario de Película</h1>
      <a class="back-link" th:href="@{/listar}">← Listar Películas</a>
      <form th:action="@{/form}" method="post" th:object="${movie}">
        <div>
          <label for="title">Título:</label>
          <div>
            <input
              type="text"
              id="title"
              name="title"
              th:field="*{title}"
              required
              maxlength="100"
              placeholder="Título de la película"
            />
          </div>
          <small
            th:if="${#fields.hasErrors('title')}"
            th:errors="*{title}"
          ></small>
        </div>
        <div>
          <label for="directors">Director:</label>
          <div>
              <input
                type="text"
                id="directors"
                name="directors"
                th:field="*{directors}"
                required
                maxlength="200"
                placeholder="Nombres de los directores (separados por coma)"
              />
          </div>
          <small
            th:if="${#fields.hasErrors('directors')}"
            th:errors="*{directors}"
          ></small>
        </div>
        <div>
          <label for="year">Año:</label>
          <div>
            <input
              type="number"
              id="year"
              name="year"
              th:field="*{year}"
              required
              min="1888"
              max="2100"
              placeholder="Año de estreno"
            />
          </div>
          <small
            th:if="${#fields.hasErrors('year')}"
            th:errors="*{year}"
          ></small>
        </div>
        <div>
          <label for="rated">Calificación:</label>
          <div>
              <input
                type="text"
                id="rated"
                name="rated"
                th:field="*{rated}"
                required
                maxlength="10"
                placeholder="Calificación de la película"
              />
          </div>
          <small
            th:if="${#fields.hasErrors('rated')}"
            th:errors="*{rated}"
          ></small>
        </div>
        <div>
          <label for="genres">Género:</label>
          <div>
              <input
                type="text"
                id="genres"
                name="genres"
                th:field="*{genres}"
                required
                maxlength="200"
                placeholder="Géneros (separados por coma)"
              />
          </div>
          <small
            th:if="${#fields.hasErrors('genres')}"
            th:errors="*{genres}"
          ></small>
        </div>
        <div>
          <label for="cast">Reparto:</label>
          <div>
              <input
                type="text"
                id="cast"
                name="cast"
                th:field="*{cast}"
                required
                maxlength="300"
                placeholder="Reparto (separado por coma)"
              />
          </div>
          <small
            th:if="${#fields.hasErrors('cast')}"
            th:errors="*{cast}"
          ></small>
        </div>
        <div>
          <label for="category.id">Categoría:</label>
          <div>
            <select th:field="*{category.id}">
              <option value="" disabled selected>Seleccione una categoría</option>
              <option
                th:each="category : ${categories}"
                th:value="${category.id}"
                th:text="${category.name}"
              ></option>
            </select>
          </div>
          <small
            th:if="${#fields.hasErrors('category.id')}"
            th:errors="*{category.id}"
          ></small>
        </div>
        <input type="submit" value="Submit" />
      </form>
    </div>
  </body>
</html>
