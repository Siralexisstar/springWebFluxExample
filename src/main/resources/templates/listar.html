<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Document</title>
</head>
<body>

    <div th:if="${param.error}" th:text="${param.error}"></div>
    <div th:if="${param.success}" th:text="${param.success}"></div>

    <h1 th:text="${titulo}">Hola Mundo</h1>
    <!-- /* Esta es la ruta para crear una pelicula */-->
    <a th:href="@{/crear}">Crear Movie</a>

    <table border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Director</th>
                <th>Year</th>
                <th>Rating</th>
                <th>List</th>
                <th>Eliminar</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="movie : ${movies}">
                <td th:text="${movie.title}">Title</td>
                    <td th:text="${movie.directors}">Director</td>
                    <td th:text="${movie.year}">Year</td>
                    <td th:text="${movie.rated}">Rating</td>
                    <td ><a th:href="@{/form/{id}(id=${movie.id})}">Edit</a></td>
                    <td><a th:href="@{/eliminar/{id}(id=${movie.id})}" onclick="return confirm('Are you sure?')">Eliminar</a></td>
            </tr>
        </tbody>
    </table>
</html>
