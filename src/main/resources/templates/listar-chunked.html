<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Document</title>
</head>
<body>
    <h1 th:text="${titulo}">Hola Mundo</h1>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Director</th>
                <th>Year</th>
                <th>Rating</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="movie : ${movies}">
                <td th:text="${movie.title}">Title</td>
                    <td th:text="${movie.directors}">Director</td>
                    <td th:text="${movie.year}">Year</td>
                    <td th:text="${movie.rated}">Rating</td>
            </tr>
        </tbody>
    </table>
</html>
